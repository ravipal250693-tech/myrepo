name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Validate HTML
      run: |
        # Check for basic HTML syntax issues
        for file in *.html; do
          if grep -q "<!DOCTYPE html>" "$file"; then
            echo "✓ $file has DOCTYPE"
          else
            echo "✗ $file missing DOCTYPE"
            exit 1
          fi
        done
        
    - name: Check required files exist
      run: |
        if [ ! -f index.html ]; then
          echo "index.html not found"
          exit 1
        fi
        if [ ! -f styles.css ]; then
          echo "styles.css not found"
          exit 1
        fi
        if [ ! -f script.js ]; then
          echo "script.js not found"
          exit 1
        fi
        echo "All required files exist"
        
    - name: Validate JavaScript syntax
      run: |
        # Basic JS syntax check using node
        node --check script.js || echo "JS syntax warning (non-critical)"
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: website-files
        path: |
          *.html
          *.css
          *.js
        retention-days: 30